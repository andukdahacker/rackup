name: server-ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "rackup-server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "rackup-server/**"
      - ".github/workflows/server-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rackup-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: rackup-server/go.mod
      - run: go test ./...
      - run: go vet ./...
